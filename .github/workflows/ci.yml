name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Discovery Server
        run: mvn -f discovery-server/pom.xml clean install -DskipTests

      - name: Build Config Server
        run: mvn -f config-server/pom.xml clean install -DskipTests

      - name: Build Movie Service
        run: mvn -f movie-service/pom.xml clean install -DskipTests

      - name: Build Theatre Service
        run: mvn -f theatre-service/pom.xml clean install -DskipTests

      - name: Build Show Service
        run: mvn -f show-service/pom.xml clean install -DskipTests

      - name: Build Booking Service
        run: mvn -f booking-service/pom.xml clean install -DskipTests

      - name: Build Browse Service
        run: mvn -f browse-service/pom.xml clean install -DskipTests

      - name: Build API Gateway
        run: mvn -f api-gateway/pom.xml clean install -DskipTests

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=NS019_MovieBookingMicroservices \
          -Dsonar.organization=ns019