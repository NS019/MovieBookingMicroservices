<p>add-movie works!</p>
<mat-card>
    <form [formGroup]="movieForm" (ngSubmit)="submitMovie()">

        <mat-form-field appearance="fill">
            <mat-label>Title</mat-label>
            <input matInput formControlName="movieName">
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Language</mat-label>
            <input matInput formControlName="language">
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Release Date</mat-label>
            <input matInput type="date" formControlName="releaseDate">
        </mat-form-field>

        <mat-form-field appearance="fill">
            <mat-label>Duration (mintues)</mat-label>
            <input matInput type="number" formControlName="duration">
        </mat-form-field>

        <button mat-raised-button color="primary" [disabled]="loading">
            {{loading?'Adding...':'Add Movie'}}
        </button>
    </form>
</mat-card>

<br><br>

<!-- Movie List -->

<mat-card>
    <h2>Movie List</h2>

    <table mat-table [dataSource]="(movies$ | async) ?? []" class="mat-elevation-z8">

        <!-- Movie Name-->
        <ng-container matColumnDef="movieName">
            <th mat-header-cell *matHeaderCellDef>Movie Name</th>
            <td mat-cell *matCellDef="let movie">{{movie.movieName}}</td>
        </ng-container>

        <!-- Language -->
        <ng-container matColumnDef="language">
            <th mat-header-cell *matHeaderCellDef>Language</th>
            <td mat-cell *matCellDef="let movie">{{movie.language}}</td>
        </ng-container>

        <!--Duration -->
        <ng-container matColumnDef="duration">
            <th mat-header-cell *matHeaderCellDef>Duration</th>
            <td mat-cell *matCellDef="let movie">{{movie.duration}} min</td>
        </ng-container>

        <!-- Release Date -->
        <ng-container matColumnDef="releaseDate">
            <th mat-header-cell *matHeaderCellDef>Release Date</th>
            <td mat-cell *matCellDef="let movie">{{movie.releaseDate}}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['movieName','language','duration','releaseDate']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['movieName','language','duration','releaseDate'];"></tr>
    </table>


</mat-card>
