spring:
    application:
        name: api-gateway
server:
  port: 8080

  cloud:
    gateway:
      routes:

        - id: movie-service
          uri: http://localhost:8081
          predicates:
            - Path=/movies/**

        - id: theatre-service
          uri: http://localhost:8082
          predicates:
            - Path=/theatres/**

        - id: show-service
          uri: http://localhost:8083
          predicates:
            - Path=/shows/**

        - id: booking-service
          uri: http://localhost:8084
          predicates:
            - Path=/bookings/**